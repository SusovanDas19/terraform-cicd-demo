name: Terraform CI/CD

on:
  push:
    branches:
      - main

jobs:
  terraform:
    runs-on: ubuntu-latest

    permissions:
      id-token: write
      contents: read

    defaults:
      run:
        working-directory: terraform

    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v3
        with:
          role-to-assume: arn:aws:iam::509399639169:role/ec2-adminaccess
          aws-region: ap-south-1

      - name: Setup Terraform
        uses: hashicorp/setup-terraform@v2

      - name: Terraform Init
        run: terraform init

      - name: Terraform Validate
        run: terraform validate

      - name: Terraform Plan
        run: terraform plan -out=tfplan -input=false

      - name: Convert Plan to JSON (robust)
        run: |
          set -euo pipefail
          terraform show -json tfplan > raw_tfplan.json

          # remove any non-JSON lines before the first "{"
          awk 'BEGIN{p=0} { if (p==0 && match($0,/^\s*{/)) p=1; if(p) print }' raw_tfplan.json > tfplan.json

          # validate JSON
          if ! jq -e . tfplan.json >/dev/null 2>&1; then
            echo "ERROR: tfplan.json is not valid JSON"
            head -n 50 raw_tfplan.json
            exit 1
          fi

      - name: Install Conftest
        run: |
          VERSION=0.45.0
          wget -q https://github.com/open-policy-agent/conftest/releases/download/v${VERSION}/conftest_${VERSION}_Linux_x86_64.tar.gz
          tar xzf conftest_${VERSION}_Linux_x86_64.tar.gz
          sudo mv conftest /usr/local/bin

      - name: Policy Check
        run: conftest test tfplan.json --policy ../policy

      - name: Terraform Apply
        if: success()
        run: terraform apply -auto-approve tfplan
